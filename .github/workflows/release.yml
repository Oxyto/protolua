name: Release Builds

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/protolua-${GOOS}-${GOARCH}${{ matrix.ext }}" ./cmd/protolua
      - name: Checksums
        run: |
          cd dist
          sha256sum * > "protolua-${{ matrix.goos }}-${{ matrix.goarch }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: protolua-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
